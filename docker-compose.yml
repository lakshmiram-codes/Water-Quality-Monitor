version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: waterwatch
      POSTGRES_PASSWORD: waterwatch
      POSTGRES_DB: waterwatch
    ports:
      - "5432:5432"
    volumes:
      - waterwatch_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waterwatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://waterwatch:waterwatch@db:5432/waterwatch
      SECRET_KEY: change-this-to-a-long-random-string
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - waterwatch_uploads:/app/uploads
    command: >
      sh -c "alembic upgrade head &&
             python seed.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: /api
    ports:
      - "5173:5173"

volumes:
  waterwatch_db_data:
  waterwatch_uploads:
